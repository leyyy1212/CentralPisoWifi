<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central PisoWiFi — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

:root {
  --bg:       #06090f;
  --surface:  #0d1117;
  --surface2: #131920;
  --border:   #1e2d3d;
  --blue:     #2f80ed;
  --blue-glow:rgba(47,128,237,0.18);
  --danger:   #e74c3c;
  --text:     #dce8f5;
  --text2:    #8ba3bc;
  --text3:    #4a6278;
  --sans:     'Plus Jakarta Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(47,128,237,0.06) 0%, transparent 60%);
}

.wrap {
  width: 100%;
  max-width: 420px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
  justify-content: center;
}

.brand-icon {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 14px var(--blue-glow);
}

.brand-name { font-size: 15px; font-weight: 700; }
.brand-tag  { font-size: 11px; color: var(--text2); margin-top: 1px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(47,128,237,0.4), transparent);
}

.card-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.card-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 28px;
  line-height: 1.6;
}

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 13px 15px;
  border-radius: 11px;
  font-size: 14px;
  font-family: var(--sans);
  outline: none;
  transition: all .2s;
}

.field input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
  background: #0f161e;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 11px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: var(--blue);
  color: #fff;
  box-shadow: 0 4px 16px var(--blue-glow);
  transition: all .2s;
  margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.btn:hover:not(:disabled) { background: #3d8ef0; transform: translateY(-1px); }
.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

.error {
  background: rgba(231,76,60,0.08);
  border: 1px solid rgba(231,76,60,0.2);
  color: #e88;
  border-radius: 9px;
  padding: 11px 14px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
  line-height: 1.5;
}
.error.show { display: block; }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text3);
}

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  display: inline-block;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">📶</div>
    <div>
      <div class="brand-name">Central PisoWiFi</div>
      <div class="brand-tag">Management Console</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Sign in to continue</div>
    <div class="card-sub">Access the admin dashboard to manage vouchers, sessions, and hotspots.</div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter your username" autofocus
        onkeydown="if(event.key==='Enter') login()">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password"
        onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn" onclick="login()" id="login-btn">
      Sign In
    </button>

    <div class="error" id="error-msg"></div>
  </div>

  <div class="footer">© 2025 Central PisoWiFi · Admin access only</div>
</div>

<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  errEl.classList.remove('show');

  if (!username || !password) {
    errEl.textContent = 'Please enter both username and password.';
    return errEl.classList.add('show');
  }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;

  try {
    const r = await fetch('/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();

    if (d.success) {
      window.location.href = '/admin';
    } else {
      errEl.textContent = d.message || 'Invalid credentials. Please try again.';
      errEl.classList.add('show');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = 'Cannot reach server. Please try again.';
    errEl.classList.add('show');
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
